<ion-modal [isOpen]="isOpen()" (didDismiss)="onModalDismiss()">
  <ng-template>
    <ion-header mode="ios">
      <ion-toolbar>
        <ion-title>New Category</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()" aria-label="Close">
            <ion-icon slot="icon-only" name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" mode="ios">
      <form class="category-form" novalidate (submit)="onSubmit($event)">
        <app-category-form-fields [categoryForm]="categoryForm" />

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isSubmitDisabled() || isSubmitting()"
        >
          @if (isSubmitting()) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Save Category
          }
        </ion-button>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
