<ion-modal [isOpen]="isOpen()" (didDismiss)="onModalDismiss()">
  <ng-template>
    <ion-header mode="ios">
      <ion-toolbar>
        <ion-title>Manage Categories</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()" aria-label="Close">
            <ion-icon slot="icon-only" name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" mode="ios">
      @if (loading() && categories().length === 0) {
        <div class="loading-state">
          <ion-spinner name="crescent"></ion-spinner>
        </div>
      } @else if (categories().length === 0) {
        <p class="empty-state">No categories yet. Create one to get started.</p>
      } @else {
        <ion-list class="categories-list" lines="full">
          @for (category of categories(); track category.id) {
            <ion-item
              button
              lines="none"
              detail="false"
              (click)="openEditCategory(category)"
            >
              <span
                class="category-color"
                slot="start"
                [style.background-color]="category.color"
                aria-hidden="true"
              ></span>
              <ion-label>{{ category.name }}</ion-label>
              <ion-icon slot="end" name="chevron-forward-outline" aria-hidden="true"></ion-icon>
            </ion-item>
          }
        </ion-list>
      }

      @if (selectedCategory(); as category) {
        <app-category-edit-modal
          [isOpen]="isEditModalOpen()"
          [category]="category"
          (dismissed)="onEditModalDismissed()"
          (deleted)="onCategoryDeleted($event)"
        />
      }
    </ion-content>
  </ng-template>
</ion-modal>
