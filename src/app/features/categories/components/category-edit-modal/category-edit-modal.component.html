<ion-modal [isOpen]="isOpen()" (didDismiss)="onModalDismiss()">
  <ng-template>
    <ion-header mode="ios">
      <ion-toolbar>
        <ion-title>Edit Category</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()" aria-label="Close">
            <ion-icon slot="icon-only" name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" mode="ios">
      <form class="category-form" novalidate (submit)="onSubmit($event)">
        <app-category-form-fields [categoryForm]="categoryForm" />

        <div class="modal-actions">
          <ion-button
            expand="block"
            type="submit"
            [disabled]="isSubmitDisabled() || isActionDisabled()"
          >
            @if (isSubmitting()) {
              <ion-spinner name="crescent"></ion-spinner>
            } @else {
              Save Changes
            }
          </ion-button>

          <ion-button
            class="delete-button"
            expand="block"
            fill="clear"
            color="danger"
            type="button"
            [disabled]="isActionDisabled()"
            (click)="onDelete()"
          >
            @if (isDeleting()) {
              <ion-spinner name="crescent"></ion-spinner>
            } @else {
              <ion-icon slot="start" name="trash-outline" aria-hidden="true"></ion-icon>
              Delete Category
            }
          </ion-button>
        </div>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
