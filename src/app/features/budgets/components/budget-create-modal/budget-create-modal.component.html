<ion-modal [isOpen]="isOpen()" (didDismiss)="onModalDismiss()">
  <ng-template>
    <ion-header mode="ios">
      <ion-toolbar>
        <ion-title>New Budget</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeModal()" aria-label="Close">
            <ion-icon slot="icon-only" name="close-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding" mode="ios">
      <form class="budget-form" novalidate (submit)="onSubmit($event)">
        <app-budget-form-fields
          [budgetForm]="budgetForm"
          [categories]="categories()"
          (createCategory)="openCategoryCreateModal()"
          (manageCategories)="openCategoriesManageModal()"
        />

        <app-category-create-modal
          [isOpen]="isCategoryCreateModalOpen()"
          (created)="onCategoryCreated($event)"
          (dismissed)="onCategoryCreateModalDismissed()"
        />

        <app-categories-manage-modal
          [isOpen]="isCategoriesManageModalOpen()"
          (dismissed)="onCategoriesManageModalDismissed()"
          (categoryDeleted)="onCategoryDeleted($event)"
        />

        <ion-button
          expand="block"
          type="submit"
          [disabled]="isSubmitDisabled() || isSubmitting()"
        >
          @if (isSubmitting()) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Save Budget
          }
        </ion-button>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
